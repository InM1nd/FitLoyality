<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FitLoyalty — Design System & Product</title>

<!-- Satoshi (Fontshare) -->
<link rel="preconnect" href="https://api.fontshare.com" />
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet" />

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<!-- Lucide icons -->
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>

<link rel="stylesheet" href="css/tokens.css" />
<link rel="stylesheet" href="css/base.css" />
<link rel="stylesheet" href="css/components.css" />
<link rel="stylesheet" href="css/dashboard.css" />
<link rel="stylesheet" href="css/mobile.css" />
</head>
<body>

  <!-- ============ TOP NAV ============ -->
  <header class="topbar">
    <div class="brand">
      <span class="logo-mark"><i data-lucide="zap"></i></span>
      <span class="name">Fit<b>Loyalty</b></span>
    </div>
    <span class="tag-pill">Design Handoff v1.0</span>

    <div class="topbar-spacer"></div>

    <nav class="seg-nav" id="sectionNav">
      <button data-sec="tokens" class="active"><i data-lucide="palette"></i> Design Tokens</button>
      <button data-sec="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</button>
      <button data-sec="mobile"><i data-lucide="smartphone"></i> Member App</button>
    </nav>

    <div class="topbar-spacer"></div>

    <div class="theme-toggle" id="themeToggle" title="Toggle light / dark">
      <button data-mode="light" aria-label="Light mode"><i data-lucide="sun"></i></button>
      <button data-mode="dark" class="on" aria-label="Dark mode"><i data-lucide="moon"></i></button>
    </div>
  </header>

  <!-- ============ SECTIONS ============ -->
  <main>
    <section class="section active" id="sec-tokens"></section>
    <section class="section" id="sec-dashboard"></section>
    <section class="section" id="sec-mobile"></section>
  </main>

  <!-- Builder modal mount (dashboard) -->
  <div class="overlay" id="builderOverlay"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/tokens.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/mobile.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
